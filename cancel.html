<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zahlung abgebrochen | WORLD CUP SHOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <style>
        body { background: #000; color: #fff; font-family: Poppins-Regular, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .cancel-card { background: #0d0d0d; border: 1px solid #222; padding: 60px 40px; border-radius: 4px; text-align: center; max-width: 500px; width: 90%; }
        .cancel-icon { width: 80px; height: 80px; background: #3a1a1a; border: 2px solid #f44336; color: #f44336; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 30px; }
        h1 { font-family: Poppins-Bold; text-transform: uppercase; letter-spacing: 3px; font-size: 24px; margin-bottom: 20px; }
        p { color: #888; line-height: 1.6; margin-bottom: 40px; }
        .btn-checkout { background: #fff; color: #000; font-family: Poppins-Bold; text-transform: uppercase; letter-spacing: 2px; padding: 15px 40px; text-decoration: none; border-radius: 2px; transition: background .2s; }
        .btn-checkout:hover { background: #e0e0e0; color: #000; text-decoration: none; }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon">✕</div>
        <h1>Zahlung abgebrochen</h1>
        <p>Der Bezahlvorgang wurde abgebrochen. Deine Artikel befinden sich noch in deinem Warenkorb.</p>
        <a href="checkout.html" class="btn-checkout">Zurück zur Kasse</a>
    </div>
</body>
</html>
