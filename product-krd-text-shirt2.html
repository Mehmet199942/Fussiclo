<script>
	$(document).ready(function () {
		var $slick = $('.slick3-pd');
		$slick.slick({
			slidesToShow: 1, slidesToScroll: 1, fade: true, infinite: true, autoplay: false,
			arrows: true,
			appendArrows: $('.wrap-slick3-arrows-pd'),
			prevArrow: '<button class="arrow-slick3 prev-slick3"><i class="fa fa-angle-left"></i></button>',
			nextArrow: '<button class="arrow-slick3 next-slick3"><i class="fa fa-angle-right"></i></button>',
			dots: true, appendDots: $('.wrap-slick3-dots-pd'), dotsClass: 'slick3-dots',
			customPaging: function (slick, index) {
				var portrait = $(slick.$slides[index]).data('thumb');
				return '<img loading="lazy" alt="" src="' + portrait + '" decoding="async"/><div class="slick3-dot-overlay"></div>';
			}
		});

		$('.slick2').slick({
			slidesToShow: 4, slidesToScroll: 1, arrows: false, dots: false,
			responsive: [
				{ breakpoint: 992, settings: { slidesToShow: 3 } },
				{ breakpoint: 768, settings: { slidesToShow: 2 } },
				{ breakpoint: 480, settings: { slidesToShow: 1 } }
			]
		});

		var selectedSize = 'M';
		$('.size-item').on('click', function () {
			$('.size-item').removeClass('active');
			$(this).addClass('active');
			selectedSize = $(this).text().trim();
			$('#detail-selection-error').hide();
		});

		$('.color-swatch').on('click', function () {
			$('.color-swatch').removeClass('active');
			$(this).addClass('active');
		});

		$('.accordion-header').on('click', function () {
			var $item = $(this).closest('.accordion-item');
			var wasActive = $item.hasClass('active');
			$('.accordion-item').removeClass('active');
			$('.accordion-header i').attr('class', 'zmdi zmdi-plus');
			if (!wasActive) {
				$item.addClass('active');
				$(this).find('i').attr('class', 'zmdi zmdi-minus');
			}
		});

		$('#detail-add-to-cart').on('click', function () {
			if (!selectedSize) {
				$('#detail-selection-error').show();
				swal('Größe wählen', 'Bitte w·hle zuerst eine Größe aus.', 'warning');
				return;
			}
			var $btn = $(this);
			$btn.text('HINZUGEF·GT ?');
			setTimeout(function() { $btn.text('IN DEN WARENKORB LEGEN'); }, 2000);
			swal('Kurdistan Text T-Shirt 2', 'In den Warenkorb gelegt!', 'success');
		});
	});
</script>
